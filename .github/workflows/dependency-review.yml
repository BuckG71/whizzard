name: Dependency Review

# Scans dependency-manifest changes in a PR for known-vulnerable or
# disallowed-license packages before they merge. This action ONLY works on
# pull_request events (it diffs the PR's base..head dependency graph), so
# there is no push trigger — which also keeps it off the per-push cost path.
#
# Requires the GitHub dependency graph to be enabled, which needs a public
# repo or GitHub Advanced Security on a private repo. Inert until then.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dep-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
