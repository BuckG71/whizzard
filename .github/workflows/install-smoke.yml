name: Install smoke

# Cross-platform "does the quickstart install + CLI actually work" check.
# Complements the test-suite matrix: this installs the package like a user
# would and runs the CLI on Ubuntu / macOS / Windows. Triggered on demand and
# on push to a smoke/** branch (so it can run from a non-default branch).
on:
  workflow_dispatch:
  push:
    branches: ["smoke/**"]

permissions:
  contents: read

concurrency:
  group: install-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Install smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install whizzard from source (clean env)
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: whiz --version reports 0.1.0
        run: |
          out=$(whiz --version); echo "$out"
          echo "$out" | grep -q "whizzard 0.1.0"
      - name: whiz --help renders
        run: whiz --help
      - name: whiz (bare) → status, on a clean home
        run: whiz
