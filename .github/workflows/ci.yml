name: CI

# Cost-tiered CI (runner minutes on a private repo are billed; macOS 10x,
# Windows 2x, Linux 1x). Three levers keep the bill down without losing
# coverage:
#   1. Trigger only on the main merge gate — pull_request into main, and
#      push to main (post-merge safety net). Feature-branch iteration is
#      covered by local `make check`; cloud CI no longer fires on every
#      branch push (and the old push+PR double-run is gone).
#   2. paths filter — skip runs when a commit touches only docs/prose. The
#      one doc that DOES gate CI is docs/decisions.md (the validate-decisions
#      job must see its changes). No branch protection / required checks are
#      configured, so a skipped run never blocks a merge.
#   3. The test job's OS x Python matrix is sized by event (see below):
#      pull_request runs Linux + current Python only; push to main runs the
#      full matrix, so the expensive mac/Windows legs run once per merge —
#      where a platform regression would ship — not on every iteration.

on:
  push:
    branches: [main]
    paths:
      - "whizzard/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
      - "docs/decisions.md"
  pull_request:
    branches: [main]
    paths:
      - "whizzard/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
      - "docs/decisions.md"

# S20.6 / launch-readiness §C: least-privilege token. CI only reads the repo
# (checkout) — no job writes contents, issues, PRs, or packages. Set the floor
# read-only at the workflow level; any future job needing more must opt in
# explicitly with its own permissions: block.
permissions:
  contents: read

# Cancel in-progress runs of the same ref on a new push — saves runner time
# during rapid iteration.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: ruff check
        run: ruff check whizzard scripts tests

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: mypy
        run: mypy whizzard scripts

  test:
    name: Tests (${{ matrix.os }} · Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Launch-readiness §K: unit suite on Ubuntu + macOS + Windows ×
        # 3.11/3.12. The mac/Windows legs catch platform-specific path and
        # behavior drift the Linux legs miss (the Windows leg exercises the
        # os.name=="nt" branches for real — safety._windows_exclusions, the
        # uid-parity fallback, and _is_pid_alive's ctypes path).
        # Integration tests (real Docker) stay Ubuntu-only — GitHub's
        # macOS/Windows runners don't provide a Linux-container Docker.
        #
        # Cost tiering (lever 3): the matrix is sized by event. A push (only
        # main reaches here) runs the FULL matrix — the mac (10x) / Windows
        # (2x) legs validate every merge. A pull_request runs Linux + current
        # Python only, for fast, cheap iteration feedback. Platform coverage
        # is preserved at the merge gate; it just stops billing on every push.
        os: ${{ fromJSON(github.event_name == 'push' && '["ubuntu-latest", "macos-latest", "windows-latest"]' || '["ubuntu-latest"]') }}
        python-version: ${{ fromJSON(github.event_name == 'push' && '["3.11", "3.12"]' || '["3.12"]') }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: pytest
        run: pytest --tb=short

  integration:
    name: Integration (real Docker)
    runs-on: ubuntu-latest
    # GitHub-hosted Ubuntu runners ship Docker pre-installed — no special
    # service container needed. Runs separately from the fast unit job
    # so the unit job's signal isn't masked by slower image-build cycles.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: Build whizzard-base image
        run: docker build -t whizzard-base:latest -f whizzard/_dockerfiles/Dockerfile whizzard/_dockerfiles/
      - name: Run integration tests
        run: pytest -m integration -v

  coverage:
    name: Coverage (≥80%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: Coverage
        run: pytest --cov=whizzard --cov-report=term-missing

  validate-decisions:
    name: Validate decisions.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Run validator
        run: python3 scripts/validate_decisions.py

  # S20.6 — Supply-chain hardening. Two checks per push:
  #   1. pip-audit over the resolved dependency tree (PyPI advisories).
  #   2. Dockerfile base images pinned by sha256 digest, not floating tag —
  #      a floating tag silently rolls the containment surface (D-74/D-75
  #      amended).
  supply-chain:
    name: Supply-chain audit (pip-audit + digest pins)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install runtime deps + pip-audit
        # Install the runtime deps explicitly (NOT `pip install -e .`)
        # so pip-audit doesn't try to look the local whizzard package
        # up on PyPI. We audit our INPUTS, not the project itself.
        run: |
          pip install typer>=0.12.0 rich>=13.0.0 mcp>=1.0
          pip install pip-audit
      - name: pip-audit (PyPI advisories)
        # --ignore-vuln entries: transitive issues outside our direct
        # control. Each must be documented here with the upstream
        # tracking pointer.
        # - PYSEC-2026-161: starlette 1.0.0 (transitive via mcp). Fix
        #   is starlette 1.0.1; will pick up automatically when mcp
        #   bumps its pin.
        run: |
          pip-audit --strict \
            --ignore-vuln PYSEC-2026-161
      - name: Dockerfiles pinned by digest
        run: |
          # Every external-registry `FROM <image>` line must include
          # `@sha256:<digest>`. A floating tag (`FROM debian:12-slim`)
          # silently rolls the cell's containment surface (D-74/D-75
          # amended). Local layered images (whizzard-base:latest in
          # Dockerfile.hermes) are skipped — their integrity anchor is
          # the underlying base's digest pin.
          bad=$(grep -hE '^FROM ' whizzard/_dockerfiles/Dockerfile* \
            | grep -vE '^FROM whizzard-' \
            | grep -vE '@sha256:[0-9a-f]{64}' || true)
          if [ -n "$bad" ]; then
            echo "::error::External Dockerfile FROM line missing sha256 digest pin:"
            echo "$bad"
            exit 1
          fi
          echo "All external Dockerfile FROM lines are digest-pinned."
