name: CI

# Runs on every push and every pull request against any branch.
# Three jobs: lint (ruff), typecheck (mypy), test (pytest across supported
# Python versions). Lint and typecheck are single-version since their
# output doesn't vary by Python; tests run on the version floor (3.11)
# and current (3.12) to catch syntax / stdlib drift.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# S20.6 / launch-readiness §C: least-privilege token. CI only reads the repo
# (checkout) — no job writes contents, issues, PRs, or packages. Set the floor
# read-only at the workflow level; any future job needing more must opt in
# explicitly with its own permissions: block.
permissions:
  contents: read

# Cancel in-progress runs of the same ref on a new push — saves runner time
# during rapid iteration.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: ruff check
        run: ruff check whizzard scripts tests

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: mypy
        run: mypy whizzard scripts

  test:
    name: Tests (${{ matrix.os }} · Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Launch-readiness §K: unit suite on Ubuntu + macOS × 3.11/3.12.
        # The maintainer develops on macOS, so the mac legs catch
        # platform-specific path/behavior drift the Linux legs miss.
        # Integration tests (real Docker) stay Ubuntu-only — GitHub's
        # macOS runners don't ship a Docker daemon.
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: pytest
        run: pytest --tb=short

  integration:
    name: Integration (real Docker)
    runs-on: ubuntu-latest
    # GitHub-hosted Ubuntu runners ship Docker pre-installed — no special
    # service container needed. Runs separately from the fast unit job
    # so the unit job's signal isn't masked by slower image-build cycles.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: Build whizzard-base image
        run: docker build -t whizzard-base:latest -f whizzard/_dockerfiles/Dockerfile whizzard/_dockerfiles/
      - name: Run integration tests
        run: pytest -m integration -v

  coverage:
    name: Coverage (≥80%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: Coverage
        run: pytest --cov=whizzard --cov-report=term-missing

  validate-decisions:
    name: Validate decisions.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Run validator
        run: python3 scripts/validate_decisions.py

  # S20.6 — Supply-chain hardening. Two checks per push:
  #   1. pip-audit over the resolved dependency tree (PyPI advisories).
  #   2. Dockerfile base images pinned by sha256 digest, not floating tag —
  #      a floating tag silently rolls the containment surface (D-74/D-75
  #      amended).
  supply-chain:
    name: Supply-chain audit (pip-audit + digest pins)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install runtime deps + pip-audit
        # Install the runtime deps explicitly (NOT `pip install -e .`)
        # so pip-audit doesn't try to look the local whizzard package
        # up on PyPI. We audit our INPUTS, not the project itself.
        run: |
          pip install typer>=0.12.0 rich>=13.0.0 mcp>=1.0
          pip install pip-audit
      - name: pip-audit (PyPI advisories)
        # --ignore-vuln entries: transitive issues outside our direct
        # control. Each must be documented here with the upstream
        # tracking pointer.
        # - PYSEC-2026-161: starlette 1.0.0 (transitive via mcp). Fix
        #   is starlette 1.0.1; will pick up automatically when mcp
        #   bumps its pin.
        run: |
          pip-audit --strict \
            --ignore-vuln PYSEC-2026-161
      - name: Dockerfiles pinned by digest
        run: |
          # Every external-registry `FROM <image>` line must include
          # `@sha256:<digest>`. A floating tag (`FROM debian:12-slim`)
          # silently rolls the cell's containment surface (D-74/D-75
          # amended). Local layered images (whizzard-base:latest in
          # Dockerfile.hermes) are skipped — their integrity anchor is
          # the underlying base's digest pin.
          bad=$(grep -hE '^FROM ' whizzard/_dockerfiles/Dockerfile* \
            | grep -vE '^FROM whizzard-' \
            | grep -vE '@sha256:[0-9a-f]{64}' || true)
          if [ -n "$bad" ]; then
            echo "::error::External Dockerfile FROM line missing sha256 digest pin:"
            echo "$bad"
            exit 1
          fi
          echo "All external Dockerfile FROM lines are digest-pinned."
