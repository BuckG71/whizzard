name: Release

# Builds sdist + wheel on tag push and publishes to PyPI via Trusted
# Publishing (OIDC, no API token storage). Triggered on tags matching
# `v*` — both stable (v0.1.0) and pre-release (v0.1.0rc1) shapes route
# to PyPI; pre-releases are excluded from `pip install whizzard`
# resolution by default (PyPI's standard pre-release semantics).
#
# Stage 19 / M4. PyPI Trusted Publishing setup is a one-time maintainer
# step at https://pypi.org/manage/account/publishing/ — register this
# repo + workflow filename + environment name (none for now) under the
# `whizzard` project. Until that's done, the publish step fails with a
# clear `invalid-token` error; tests + build steps still validate.

on:
  push:
    tags:
      - "v*"

# S20.6 / launch-readiness §C: least-privilege floor. verify + build only
# read the repo; the publish job opts up to id-token: write for OIDC below.
permissions:
  contents: read

# Don't cancel in-progress releases. If two tags land in quick succession,
# both should build and publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate the publish on the same checks CI uses. If the unit suite is red
  # at the tagged commit, refuse to ship the artifact.
  verify:
    name: Verify (lint + typecheck + tests)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: Lint
        if: matrix.python-version == '3.12'
        run: ruff check whizzard scripts tests
      - name: Typecheck
        if: matrix.python-version == '3.12'
        run: mypy whizzard scripts
      - name: Unit tests
        run: pytest --tb=short

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install build
        run: pip install build
      - name: Build distribution
        run: python -m build
      - name: Verify Dockerfiles are in the artifacts
        # Belt-and-suspenders: confirm the package-data wiring actually
        # included Dockerfile + Dockerfile.hermes in both the sdist and
        # the wheel. Catches regressions where pyproject.toml drifts.
        # Materializes the listings first to sidestep the pipefail +
        # grep -q SIGPIPE failure mode.
        run: |
          set -eux
          tar tzf dist/whizzard-*.tar.gz > /tmp/sdist-list
          unzip -l dist/whizzard-*-py3-none-any.whl > /tmp/wheel-list
          grep -q "whizzard/_dockerfiles/Dockerfile$" /tmp/sdist-list
          grep -q "whizzard/_dockerfiles/Dockerfile.hermes$" /tmp/sdist-list
          grep -q "whizzard/_dockerfiles/Dockerfile" /tmp/wheel-list
          grep -q "whizzard/_dockerfiles/Dockerfile.hermes" /tmp/wheel-list
      - name: Upload distribution as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    # Trusted Publishing requires `id-token: write` so the workflow can
    # mint an OIDC token for PyPI. No `PYPI_API_TOKEN` secret is set or
    # needed. A job-level permissions: block fully REPLACES the workflow
    # default, so contents: read is restated here (download-artifact
    # doesn't strictly need it, but keeping the floor explicit avoids a
    # surprise if a checkout step is added later).
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          # No `password:` — Trusted Publishing handles auth via OIDC.
          # `skip-existing: true` is intentionally NOT set: a re-tag with
          # the same version should fail loudly, not silently no-op.
          packages-dir: dist/
